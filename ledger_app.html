<head>

<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        /* --- ICONS --- */
        const DashboardIcon = () => <svg className="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z" /></svg>;
        const LedgerIcon = () => <svg className="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>;
        const CompanyIcon = () => <svg className="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>;
        const ReportIcon = () => <svg className="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>;
        const SettingsIcon = () => <svg className="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>;
        const SaveIcon = () => <svg className="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>;
        const TrashIcon = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>;
        const DownloadIcon = () => <svg className="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>;
        const LockIcon = () => <svg className="w-12 h-12 text-indigo-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>;
        const LogoutIcon = () => <svg className="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>;
        const SearchIcon = () => <svg className="w-4 h-4 text-slate-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>;
        const HomeIcon = () => <svg className="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>;
        const ChartIcon = () => <svg className="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>;
        const PdfIcon = () => <svg className="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>;
        const MoneyIcon = () => <svg className="w-4 h-4 mr-2 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z" /></svg>;

        const LedgerChart = ({ transactions }) => {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);

            const chartData = useMemo(() => {
                const months = {};
                for (let i = 5; i >= 0; i--) {
                    const d = new Date();
                    d.setMonth(d.getMonth() - i);
                    const label = d.toLocaleString('default', { month: 'short', year: 'numeric' });
                    months[label] = { sales: 0, purchases: 0 };
                }

                transactions.forEach(t => {
                    const d = new Date(t.date);
                    if (isNaN(d.getTime())) return;
                    const label = d.toLocaleString('default', { month: 'short', year: 'numeric' });
                    if (months[label] !== undefined) {
                        months[label].sales += (t.saleAmount || 0);
                        months[label].purchases += (t.purchaseValue || 0);
                    }
                });

                return {
                    labels: Object.keys(months),
                    sales: Object.values(months).map(m => m.sales),
                    purchases: Object.values(months).map(m => m.purchases)
                };
            }, [transactions]);

            useEffect(() => {
                if (chartRef.current) chartRef.current.destroy();
                if (canvasRef.current && window.Chart) {
                    const ctx = canvasRef.current.getContext('2d');
                    chartRef.current = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: chartData.labels,
                            datasets: [
                                { label: 'Goods Purchases', data: chartData.purchases, backgroundColor: 'rgba(59, 130, 246, 0.85)', borderRadius: 6 },
                                { label: 'Sales/Payments', data: chartData.sales, backgroundColor: 'rgba(16, 185, 129, 0.85)', borderRadius: 6 }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } } }
                    });
                }
                return () => { if (chartRef.current) chartRef.current.destroy(); };
            }, [chartData]);

            return <div className="h-64 md:h-80 w-full relative"><canvas ref={canvasRef}></canvas></div>;
        };

        function App() {
          const [activeTab, setActiveTab] = useState('dashboard');
          const [isAuthenticated, setIsAuthenticated] = useState(false);
          const [loginUser, setLoginUser] = useState('');
          const [loginPass, setLoginPass] = useState('');
          const [loginError, setLoginError] = useState('');

          const [transactions, setTransactions] = useState([]);
          const [openingBalance, setOpeningBalance] = useState(0);
          
          const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
          const [particulars, setParticulars] = useState('');
          const [pivNo, setPivNo] = useState('');
          const [purchaseValue, setPurchaseValue] = useState('');
          const [liabilityAmount, setLiabilityAmount] = useState('');
          const [saleAmount, setSaleAmount] = useState('');

          const [searchTerm, setSearchTerm] = useState('');
          const [filterType, setFilterType] = useState('all');
          const [currentPage, setCurrentPage] = useState(1);
          const rowsPerPage = 50;

          const [newOpeningBalance, setNewOpeningBalance] = useState('');
          const [resetCurrentPass, setResetCurrentPass] = useState('');
          const [resetNewPass, setResetNewPass] = useState('');
          const [resetConfirmPass, setResetConfirmPass] = useState('');
          const [resetMessage, setResetMessage] = useState(null);

          const [excelWorkbook, setExcelWorkbook] = useState(null);
          const [excelSheets, setExcelSheets] = useState([]);
          const [selectedSheet, setSelectedSheet] = useState('');
          
          const currDate = new Date();
          const firstDay = new Date(currDate.getFullYear(), currDate.getMonth(), 1).toISOString().split('T')[0];
          const [reportStartDate, setReportStartDate] = useState(firstDay);
          const [reportEndDate, setReportEndDate] = useState(currDate.toISOString().split('T')[0]);

          /* --- Settlement & Company State --- */
          const [selectedCompanyName, setSelectedCompanyName] = useState(null);
          
          const [quickPayCompany, setQuickPayCompany] = useState(null);
          const [quickPayAmount, setQuickPayAmount] = useState('');
          const [quickPayDate, setQuickPayDate] = useState(new Date().toISOString().split('T')[0]);
          const [quickPayRef, setQuickPayRef] = useState('');

          const [fileHandle, setFileHandle] = useState(null);
          const [autoSaveStatus, setAutoSaveStatus] = useState('Not connected to Desktop');
          const [unsavedChangesCount, setUnsavedChangesCount] = useState(0);

          const knownCompanies = ["bruklyn", "abn", "medibest", "varghesesco", "varghese", "zedwell", "relife pharma", "relife", "anandha", "neethi ekm", "jaison", "classic", "clasic", "tdh", "veena", "southern", "green specialities", "intimate", "new life", "jb pharma", "sabari", "neethi ktm", "jaycee pharma", "zedwell distributor"];

          useEffect(() => {
            if(sessionStorage.getItem('neethi_auth') === 'true') setIsAuthenticated(true);
          }, []);

          useEffect(() => {
            if (isAuthenticated) {
                const savedTransactions = localStorage.getItem('neethi_transactions');
                const savedBalance = localStorage.getItem('neethi_opening_balance');
                if (savedTransactions) setTransactions(JSON.parse(savedTransactions));
                if (savedBalance) {
                  setOpeningBalance(parseFloat(savedBalance));
                  setNewOpeningBalance(savedBalance);
                }
            }
          }, [isAuthenticated]);

          useEffect(() => {
            if (isAuthenticated) {
                localStorage.setItem('neethi_transactions', JSON.stringify(transactions));
                localStorage.setItem('neethi_opening_balance', openingBalance.toString());
            }
          }, [transactions, openingBalance, isAuthenticated]);

          const handleLogin = (e) => {
            e.preventDefault();
            const correctUsername = "admin";
            const correctPassword = localStorage.getItem('neethi_admin_pass') || "admin123";
            if (loginUser === correctUsername && loginPass === correctPassword) {
                setIsAuthenticated(true);
                setLoginError('');
                sessionStorage.setItem('neethi_auth', 'true');
            } else {
                setLoginError('Invalid username or password.');
            }
          };

          const handleLogout = () => {
              setIsAuthenticated(false);
              setLoginUser('');
              setLoginPass('');
              sessionStorage.removeItem('neethi_auth');
          };

          const roundToTwo = (num) => Math.round(num * 100) / 100;

          const formatDate = (dateStr) => {
              if (!dateStr) return '';
              if (dateStr.includes('-')) {
                  const [y, m, d] = dateStr.split('-');
                  if (y.length === 4) return `${d}-${m}-${y}`;
              }
              return dateStr;
          };

          const parseDateString = (dateStr) => {
              if (!dateStr) return '';
              if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return dateStr;
              const parts = String(dateStr).trim().split(/[-/ ]+/);
              if (parts.length === 3) {
                  if (parts[2].length === 4) return `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
                  if (parts[0].length === 4) return `${parts[0]}-${parts[1].padStart(2, '0')}-${parts[2].padStart(2, '0')}`;
              }
              return dateStr;
          };

          const parseExcelDate = (val) => {
              if (val instanceof Date) return val.toISOString().split('T')[0];
              if (typeof val === 'number' && val > 30000 && val < 60000) {
                  const date = new Date((val - 25569) * 86400 * 1000);
                  return date.toISOString().split('T')[0];
              }
              return parseDateString(String(val));
          };

          const ledger = useMemo(() => {
            const sorted = [...transactions].sort((a, b) => {
              if (a.date === b.date) return a.timestamp - b.timestamp;
              return new Date(a.date) - new Date(b.date);
            });
            let currentBalance = openingBalance;
            return sorted.map(t => {
              const liab = t.liabilityAmount || 0;
              const sale = t.saleAmount || 0;
              currentBalance = roundToTwo(currentBalance + liab - sale);
              return { ...t, runningBalance: currentBalance };
            });
          }, [transactions, openingBalance]);

          const filteredLedger = useMemo(() => {
              return ledger.filter(t => {
                  const matchesSearch = t.particulars.toLowerCase().includes(searchTerm.toLowerCase()) || (t.pivNo && t.pivNo.includes(searchTerm));
                  if (!matchesSearch) return false;
                  if (filterType === 'all') return true;
                  if (filterType === 'purchase') return t.purchaseValue > 0;
                  if (filterType === 'liability') return t.liabilityAmount > 0;
                  if (filterType === 'sale') return t.saleAmount > 0;
                  return true;
              });
          }, [ledger, searchTerm, filterType]);

          const paginatedLedger = useMemo(() => {
              const startIndex = (currentPage - 1) * rowsPerPage;
              return [...filteredLedger].reverse().slice(startIndex, startIndex + rowsPerPage);
          }, [filteredLedger, currentPage]);

          const totalPages = Math.ceil(filteredLedger.length / rowsPerPage) || 1;

          const { totalPurchases, totalLiability, totalSales, currentBalance } = useMemo(() => {
            let purch = 0, liab = 0, sales = 0;
            transactions.forEach(t => {
              if (t.purchaseValue) purch += t.purchaseValue;
              if (t.liabilityAmount) liab += t.liabilityAmount;
              if (t.saleAmount) sales += t.saleAmount;
            });
            return { totalPurchases: purch, totalLiability: liab, totalSales: sales, currentBalance: roundToTwo(openingBalance + liab - sales) };
          }, [transactions, openingBalance]);

          const companyBalances = useMemo(() => {
              const balances = {};
              transactions.forEach(t => {
                  const p = (t.particulars || '').trim().toLowerCase();
                  const matchedCompany = knownCompanies.find(c => p.startsWith(c));
                  if (matchedCompany) {
                      if (!balances[matchedCompany]) balances[matchedCompany] = { bills: 0, returnsPayments: 0, netOutstanding: 0, txs: [] };
                      balances[matchedCompany].bills += (t.liabilityAmount || 0);
                      balances[matchedCompany].returnsPayments += (t.saleAmount || 0);
                      balances[matchedCompany].netOutstanding += ((t.liabilityAmount || 0) - (t.saleAmount || 0));
                      balances[matchedCompany].txs.push(t);
                  }
              });
              return Object.entries(balances).map(([name, stats]) => ({ name, ...stats, netOutstanding: roundToTwo(stats.netOutstanding) })).sort((a, b) => b.netOutstanding - a.netOutstanding);
          }, [transactions]);

          const reportData = useMemo(() => {
            const filtered = transactions.filter(t => t.date >= reportStartDate && t.date <= reportEndDate);
            let tcSale = 0, tuSale = 0, tpValue = 0, tpReturn = 0, cStats = {}; 
            let cList = [], uList = [], pList = [], rList = [];

            filtered.forEach(t => {
                const p = (t.particulars || '').trim().toLowerCase();
                const saleAmt = t.saleAmount || 0, liabAmt = t.liabilityAmount || 0, purchVal = t.purchaseValue || 0;

                if (p === 'cash') { tcSale += saleAmt; if(saleAmt > 0) cList.push(t); }
                if (p === 'upi') { tuSale += saleAmt; if(saleAmt > 0) uList.push(t); }
                if (purchVal > 0) { tpValue += purchVal; pList.push(t); }
                if (p.includes('purchase return') || p.includes('return')) { tpReturn += saleAmt; if (saleAmt > 0) rList.push(t); }

                const matchedCompany = knownCompanies.find(c => p.startsWith(c));
                if (matchedCompany) {
                    if (!cStats[matchedCompany]) cStats[matchedCompany] = { bills: 0, returnsPayments: 0, netOutstanding: 0 };
                    cStats[matchedCompany].bills += liabAmt;
                    cStats[matchedCompany].returnsPayments += saleAmt;
                    cStats[matchedCompany].netOutstanding += (liabAmt - saleAmt);
                }
            });

            return {
                totalCashSale: roundToTwo(tcSale), totalUpiSale: roundToTwo(tuSale), totalCombinedSales: roundToTwo(tcSale + tuSale),
                totalPurchaseValue: roundToTwo(tpValue), totalPurchaseReturn: roundToTwo(tpReturn),
                companyStats: Object.entries(cStats).map(([name, stats]) => ({ name, ...stats, netOutstanding: roundToTwo(stats.netOutstanding) })).sort((a,b) => b.netOutstanding - a.netOutstanding),
                cashSalesList: cList, upiSalesList: uList, purchaseList: pList, returnList: rList
            };
          }, [transactions, reportStartDate, reportEndDate]);

          const exportReportToPDF = () => {
            if (!window.jspdf) { alert("PDF library is still loading. Please check your internet connection."); return; }
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');

            const checkPageBreak = (currentY, neededSpace = 30) => {
                if (currentY + neededSpace > 280) { doc.addPage(); return 20; }
                return currentY;
            };

            doc.setFontSize(18); doc.setFont("helvetica", "bold"); doc.text("NEETHI MEDICALS - FINANCIAL REPORT", 14, 20);
            doc.setFontSize(11); doc.setFont("helvetica", "normal");
            doc.text(`Report Period: ${formatDate(reportStartDate)} to ${formatDate(reportEndDate)}`, 14, 28);
            doc.text(`Generated On: ${formatDate(new Date().toISOString().split('T')[0])}`, 14, 34);

            doc.setDrawColor(200); doc.setFillColor(245, 245, 245); doc.rect(14, 40, 182, 30, 'FD'); 
            doc.setFontSize(10); doc.setFont("helvetica", "bold");
            doc.text(`Total Cash Sale:`, 18, 48); doc.text(`Total UPI Sale:`, 18, 56); doc.text(`Total Combined Sales:`, 18, 64);
            doc.setFont("helvetica", "normal");
            doc.text(`Rs. ${reportData.totalCashSale.toLocaleString('en-IN')}`, 65, 48); doc.text(`Rs. ${reportData.totalUpiSale.toLocaleString('en-IN')}`, 65, 56);
            doc.setFont("helvetica", "bold"); doc.text(`Rs. ${reportData.totalCombinedSales.toLocaleString('en-IN')}`, 65, 64);

            doc.setFont("helvetica", "bold"); doc.text(`Total Goods Purchase:`, 110, 48); doc.text(`Purchase Returns:`, 110, 56);
            doc.setFont("helvetica", "normal");
            doc.text(`Rs. ${reportData.totalPurchaseValue.toLocaleString('en-IN')}`, 155, 48); doc.text(`Rs. ${reportData.totalPurchaseReturn.toLocaleString('en-IN')}`, 155, 56);

            let currentY = 80;
            doc.setFontSize(12); doc.setFont("helvetica", "bold"); doc.text("1. Company-Wise Outstanding Summary", 14, currentY);
            doc.autoTable({
                startY: currentY + 4,
                head: [['Company Name', 'Bills Added (+)', 'Returns / Payments (-)', 'Net Outstanding']],
                body: reportData.companyStats.map(c => [ c.name.toUpperCase(), c.bills > 0 ? c.bills.toLocaleString('en-IN', { minimumFractionDigits: 2 }) : '-', c.returnsPayments > 0 ? c.returnsPayments.toLocaleString('en-IN', { minimumFractionDigits: 2 }) : '-', c.netOutstanding.toLocaleString('en-IN', { minimumFractionDigits: 2 }) ]),
                theme: 'grid', headStyles: { fillColor: [79, 70, 229], textColor: [255, 255, 255] }, styles: { fontSize: 9, cellPadding: 3 }, columnStyles: { 1: { halign: 'right' }, 2: { halign: 'right' }, 3: { halign: 'right', fontStyle: 'bold' } }
            });

            currentY = checkPageBreak(doc.lastAutoTable.finalY + 15, 30);
            doc.setFontSize(12); doc.setFont("helvetica", "bold"); doc.text(`2. Goods Purchases (Total: Rs. ${reportData.totalPurchaseValue.toLocaleString('en-IN')})`, 14, currentY);
            doc.autoTable({
                startY: currentY + 4, head: [['Date', 'Particulars', 'PIV No', 'Purchase Value']],
                body: reportData.purchaseList.length ? reportData.purchaseList.map(t => [formatDate(t.date), t.particulars.toUpperCase(), t.pivNo || '-', t.purchaseValue.toLocaleString('en-IN', { minimumFractionDigits: 2 })]) : [['-', 'No purchases found', '-', '-']],
                theme: 'grid', headStyles: { fillColor: [59, 130, 246], textColor: [255, 255, 255] }, styles: { fontSize: 9 }, columnStyles: { 3: { halign: 'right' } }
            });

            currentY = checkPageBreak(doc.lastAutoTable.finalY + 15, 30);
            doc.setFontSize(12); doc.setFont("helvetica", "bold"); doc.text(`3. Cash Sales (Total: Rs. ${reportData.totalCashSale.toLocaleString('en-IN')})`, 14, currentY);
            doc.autoTable({
                startY: currentY + 4, head: [['Date', 'Particulars', 'Amount']],
                body: reportData.cashSalesList.length ? reportData.cashSalesList.map(t => [formatDate(t.date), t.particulars.toUpperCase(), t.saleAmount.toLocaleString('en-IN', { minimumFractionDigits: 2 })]) : [['-', 'No cash sales found', '-']],
                theme: 'grid', headStyles: { fillColor: [16, 185, 129], textColor: [255, 255, 255] }, styles: { fontSize: 9 }, columnStyles: { 2: { halign: 'right' } }
            });

            currentY = checkPageBreak(doc.lastAutoTable.finalY + 15, 30);
            doc.setFontSize(12); doc.setFont("helvetica", "bold"); doc.text(`4. UPI Sales (Total: Rs. ${reportData.totalUpiSale.toLocaleString('en-IN')})`, 14, currentY);
            doc.autoTable({
                startY: currentY + 4, head: [['Date', 'Particulars', 'Amount']],
                body: reportData.upiSalesList.length ? reportData.upiSalesList.map(t => [formatDate(t.date), t.particulars.toUpperCase(), t.saleAmount.toLocaleString('en-IN', { minimumFractionDigits: 2 })]) : [['-', 'No UPI sales found', '-']],
                theme: 'grid', headStyles: { fillColor: [16, 185, 129], textColor: [255, 255, 255] }, styles: { fontSize: 9 }, columnStyles: { 2: { halign: 'right' } }
            });

            currentY = checkPageBreak(doc.lastAutoTable.finalY + 15, 30);
            doc.setFontSize(12); doc.setFont("helvetica", "bold"); doc.text(`5. Purchase Returns Report (Total: Rs. ${reportData.totalPurchaseReturn.toLocaleString('en-IN')})`, 14, currentY);
            doc.autoTable({
                startY: currentY + 4, head: [['Date', 'Company / Particulars', 'PIV No', 'Return Amount (-)']],
                body: reportData.returnList.length ? reportData.returnList.map(t => [formatDate(t.date), t.particulars.toUpperCase(), t.pivNo || '-', t.saleAmount.toLocaleString('en-IN', { minimumFractionDigits: 2 })]) : [['-', 'No returns found', '-', '-']],
                theme: 'grid', headStyles: { fillColor: [139, 92, 246], textColor: [255, 255, 255] }, styles: { fontSize: 9 }, columnStyles: { 3: { halign: 'right' } }
            });

            doc.save(`Neethi_Report_${formatDate(reportStartDate)}_to_${formatDate(reportEndDate)}.pdf`);
          };

          const handleSubmit = (e) => {
            e.preventDefault();
            if (!particulars) return;
            if (!purchaseValue && !liabilityAmount && !saleAmount) { alert("Please enter at least one amount."); return; }

            const newTransaction = {
              id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(),
              timestamp: Date.now(),
              date, particulars: particulars.toLowerCase().trim(), pivNo,
              purchaseValue: purchaseValue ? parseFloat(purchaseValue) : 0,
              liabilityAmount: liabilityAmount ? parseFloat(liabilityAmount) : 0,
              saleAmount: saleAmount ? parseFloat(saleAmount) : 0
            };

            setTransactions([...transactions, newTransaction]);
            setUnsavedChangesCount(prev => prev + 1);
            setParticulars(''); setPivNo(''); setPurchaseValue(''); setLiabilityAmount(''); setSaleAmount('');
          };

          // --- QUICK SUPPLIER SETTLEMENT HANDLER ---
          const handleQuickPaySubmit = (e) => {
              e.preventDefault();
              const amt = parseFloat(quickPayAmount);
              if(!amt || amt <= 0) return;
              
              const newTx = {
                  id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(),
                  timestamp: Date.now(),
                  date: quickPayDate,
                  particulars: quickPayCompany.toLowerCase().trim(),
                  pivNo: quickPayRef || 'PAYMENT/SETTLEMENT',
                  purchaseValue: 0,
                  liabilityAmount: 0,
                  saleAmount: amt // Pays down balance
              };
              setTransactions([...transactions, newTx]);
              setUnsavedChangesCount(prev => prev + 1);
              setQuickPayCompany(null);
              setQuickPayAmount('');
              setQuickPayRef('');
              alert(`Success! Payment of ₹${amt} to ${quickPayCompany} recorded.`);
          };

          const handleDelete = (id) => {
            if (window.confirm('Are you sure you want to delete this entry?')) {
              setTransactions(transactions.filter(t => t.id !== id));
              setUnsavedChangesCount(prev => prev + 1);
            }
          };

          const handleUpdateBalance = (e) => {
            e.preventDefault();
            if (!isNaN(newOpeningBalance)) {
              setOpeningBalance(parseFloat(newOpeningBalance));
              setUnsavedChangesCount(prev => prev + 1);
              alert("Opening balance updated.");
            }
          };

          const handlePasswordReset = (e) => {
              e.preventDefault();
              const correctPassword = localStorage.getItem('neethi_admin_pass') || "admin123";
              if (resetCurrentPass !== correctPassword) { setResetMessage({ type: 'error', text: 'Current password incorrect.' }); return; }
              if (resetNewPass !== resetConfirmPass) { setResetMessage({ type: 'error', text: 'Passwords do not match.' }); return; }
              if (resetNewPass.length < 4) { setResetMessage({ type: 'error', text: 'Password too short.' }); return; }
              
              localStorage.setItem('neethi_admin_pass', resetNewPass);
              setResetMessage({ type: 'success', text: 'Password updated!' });
              setResetCurrentPass(''); setResetNewPass(''); setResetConfirmPass('');
              setTimeout(() => setResetMessage(null), 4000);
          };

          const handleClearData = () => {
              const pass = window.prompt("WARNING: This will permanently delete ALL ledger entries.\n\nEnter admin password to confirm:");
              const correctPassword = localStorage.getItem('neethi_admin_pass') || "admin123";
              if (pass === correctPassword) {
                  if (window.confirm("Are you ABSOLUTELY sure? This cannot be undone.")) {
                      setTransactions([]); setOpeningBalance(0); setNewOpeningBalance('');
                      setUnsavedChangesCount(0); setActiveTab('dashboard');
                      alert("All data wiped.");
                  }
              } else if (pass !== null) { alert("Incorrect password."); }
          };

          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const data = new Uint8Array(event.target.result);
                    const wb = XLSX.read(data, { type: 'array', cellDates: true });
                    setExcelWorkbook(wb);
                    setExcelSheets(wb.SheetNames);
                    if (wb.SheetNames.length > 0) setSelectedSheet(wb.SheetNames[0]);
                } catch (err) { alert("Failed to load file. Ensure it is a valid Excel or CSV."); }
            };
            reader.readAsArrayBuffer(file);
          };

          const importSelectedSheet = () => {
            if (!excelWorkbook || !selectedSheet) return;
            try {
                const sheet = excelWorkbook.Sheets[selectedSheet];
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
                if (rows.length === 0) { alert("Selected sheet is empty."); return; }

                let dateIdx = 0, particularsIdx = 1, pivIdx = 2, purchaseIdx = 3, liabilityIdx = 3, saleIdx = 4;
                for (let r = 0; r < Math.min(15, rows.length); r++) {
                    const row = rows[r];
                    const hasDate = row.some(cell => String(cell).toLowerCase().includes('date'));
                    const hasPart = row.some(cell => String(cell).toLowerCase().includes('particular'));
                    if (hasDate && hasPart) {
                        row.forEach((cell, idx) => {
                            const val = String(cell).toLowerCase().trim();
                            if (val.includes('date')) dateIdx = idx;
                            else if (val.includes('particular')) particularsIdx = idx;
                            else if (val.includes('piv') || val.includes('bill')) pivIdx = idx;
                            else if (val.includes('goods purchase value') || val.includes('purchase (info)')) purchaseIdx = idx;
                            else if (val.includes('liability (+)') || val.includes('liability amount')) liabilityIdx = idx;
                            else if (val.includes('sale') || val.includes('payment')) saleIdx = idx;
                            else if (val.includes('balance (s.v)') || val.includes('purchase') || val.includes('liability')) {
                                if (!val.includes('running') && val !== 'liability') { purchaseIdx = idx; liabilityIdx = idx; }
                            }
                        });
                        break;
                    }
                }

                const newTransactions = [];
                const dateRegex = /^\d{4}-\d{2}-\d{2}$/;
                rows.forEach((row, index) => {
                    if (row.length < 2) return;
                    const rawDate = row[dateIdx];
                    if (!rawDate || String(rawDate).toLowerCase().includes('date')) return;
                    const dateStr = parseExcelDate(rawDate);
                    if (!dateRegex.test(dateStr)) return;
                    const particulars = String(row[particularsIdx] || '').trim().toLowerCase();
                    if (!particulars || particulars === 'particulars') return;
                    const pivNo = String(row[pivIdx] || '').trim();
                    const pVal = parseFloat(row[purchaseIdx]) || 0, lAmt = parseFloat(row[liabilityIdx]) || 0, sAmt = parseFloat(row[saleIdx]) || 0;

                    if (pVal > 0 || lAmt > 0 || sAmt > 0) {
                        newTransactions.push({
                            id: (crypto.randomUUID ? crypto.randomUUID() : Date.now().toString()) + '-' + index,
                            timestamp: Date.now() + index, date: dateStr, particulars, pivNo, purchaseValue: pVal, liabilityAmount: lAmt, saleAmount: sAmt
                        });
                    }
                });

                if (newTransactions.length > 0) {
                    if(window.confirm(`Found ${newTransactions.length} entries. Import them?`)) {
                        setTransactions(prev => [...prev, ...newTransactions]);
                        setExcelWorkbook(null); setExcelSheets([]); setSelectedSheet('');
                        setUnsavedChangesCount(prev => prev + newTransactions.length);
                        setActiveTab('ledger');
                        alert("Data imported successfully!");
                    }
                } else { alert('No valid transactions found.'); }
            } catch (err) { alert("Error importing sheet."); }
          };

          const getCsvContent = (ledgerData) => {
            const headers = ['Date', 'Particulars', 'PIV No.', 'Goods Purchase Value (Info)', 'Liability (+)', 'Sale/Payment (-)', 'Running Balance'];
            const rows = ledgerData.map(t => [ formatDate(t.date), t.particulars, t.pivNo || '', t.purchaseValue || '', t.liabilityAmount || '', t.saleAmount || '', t.runningBalance ]);
            return [headers.join(','), ...rows.map(e => e.join(','))].join('\n');
          };

          const connectDesktopFile = async () => {
            try {
              if (!window.showSaveFilePicker) { alert("Requires Google Chrome/Edge."); return; }
              const handle = await window.showSaveFilePicker({ suggestedName: `Neethi_Medicals_Ledger.csv`, types: [{ description: 'CSV File', accept: { 'text/csv': ['.csv'] } }] });
              setFileHandle(handle); setAutoSaveStatus('🟢 Connected! Auto-saving enabled.'); setUnsavedChangesCount(0);
              const writable = await handle.createWritable(); await writable.write(getCsvContent(ledger)); await writable.close();
            } catch (error) {
              if (error.name === 'SecurityError') { setAutoSaveStatus('⚠️ Direct sync blocked. Use Manual Backup.'); } 
              else if (error.name !== 'AbortError') { setAutoSaveStatus('🔴 Auto-save failed!'); }
            }
          };

          useEffect(() => {
            if (!fileHandle) return;
            const saveAutomatically = async () => {
              try {
                setAutoSaveStatus('🔄 Saving...');
                const writable = await fileHandle.createWritable(); await writable.write(getCsvContent(ledger)); await writable.close();
                setAutoSaveStatus(`🟢 Auto-saved at ${new Date().toLocaleTimeString()}`);
                setUnsavedChangesCount(0);
              } catch (error) { setAutoSaveStatus('🔴 Auto-save failed!'); }
            };
            saveAutomatically();
          }, [ledger, fileHandle]);

          const exportToCSV = () => {
            const csvContent = getCsvContent(ledger);
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Neethi_Medicals_Ledger_${formatDate(new Date().toISOString().split('T')[0])}.csv`;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
            setUnsavedChangesCount(0);
          };

          /* --- Active Company Statement Processor (Adds Running Balance specifically for modals) --- */
          const activeCompanyDetails = useMemo(() => {
              if(!selectedCompanyName) return null;
              const comp = companyBalances.find(c => c.name === selectedCompanyName);
              if(!comp) return null;
              
              // Sort by date, then add running balance
              let runBal = 0;
              const historyWithBalance = comp.txs.slice().sort((a,b) => {
                  if(a.date === b.date) return a.timestamp - b.timestamp;
                  return new Date(a.date) - new Date(b.date);
              }).map(tx => {
                  runBal += (tx.liabilityAmount || 0) - (tx.saleAmount || 0);
                  return { ...tx, compRunBal: runBal };
              }).reverse(); // Reverse so newest is at the top of the table
              
              return { ...comp, txs: historyWithBalance };
          }, [selectedCompanyName, companyBalances]);


          if (!isAuthenticated) {
              return (
                  <div className="min-h-screen bg-slate-100 flex flex-col justify-center items-center p-4">
                      <div className="max-w-md w-full bg-white p-8 rounded-3xl shadow-xl border border-slate-200/60 text-center">
                          <div className="flex justify-center mb-2"><div className="p-4 bg-indigo-50 rounded-2xl"><LockIcon /></div></div>
                          <h1 className="text-2xl font-black text-slate-900 tracking-tight">NEETHI MEDICALS</h1>
                          <p className="text-slate-400 mt-1 mb-8 text-sm font-medium">Enterprise Management System</p>
                          {loginError && <div className="mb-4 p-3 bg-red-50 text-red-600 text-sm rounded-xl font-medium">{loginError}</div>}
                          <form onSubmit={handleLogin} className="space-y-4">
                              <div className="text-left"><label className="block text-xs font-bold text-slate-500 uppercase mb-1">Username</label><input type="text" value={loginUser} onChange={(e) => setLoginUser(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border rounded-xl" placeholder="admin" required/></div>
                              <div className="text-left mb-6"><label className="block text-xs font-bold text-slate-500 uppercase mb-1">Password</label><input type="password" value={loginPass} onChange={(e) => setLoginPass(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border rounded-xl" placeholder="••••••••" required/></div>
                              <button type="submit" className="w-full py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg">Secure Log In</button>
                          </form>
                      </div>
                  </div>
              );
          }

          return (
            <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row">
              <aside className="w-full md:w-64 bg-slate-900 text-slate-300 flex-shrink-0 flex flex-col border-r border-slate-800">
                <div className="p-6 border-b border-slate-800">
                    <h2 className="text-lg font-black text-white">NEETHI MEDICALS</h2>
                    <span className="text-[10px] uppercase font-bold text-indigo-400">Admin Control ERP</span>
                </div>
                <nav className="flex-1 px-4 py-6 space-y-1.5">
                    <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center px-4 py-3 text-sm font-semibold rounded-xl ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}><DashboardIcon /> Dashboard</button>
                    <button onClick={() => setActiveTab('ledger')} className={`w-full flex items-center px-4 py-3 text-sm font-semibold rounded-xl ${activeTab === 'ledger' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}><LedgerIcon /> Ledger Entry</button>
                    <button onClick={() => setActiveTab('companies')} className={`w-full flex items-center px-4 py-3 text-sm font-semibold rounded-xl ${activeTab === 'companies' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}><CompanyIcon /> Supplier Directory</button>
                    <button onClick={() => setActiveTab('reports')} className={`w-full flex items-center px-4 py-3 text-sm font-semibold rounded-xl ${activeTab === 'reports' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}><ReportIcon /> Financial Reports</button>
                    <button onClick={() => setActiveTab('settings')} className={`w-full flex items-center px-4 py-3 text-sm font-semibold rounded-xl ${activeTab === 'settings' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}><SettingsIcon /> ERP Settings</button>
                </nav>
                <div className="p-4 border-t border-slate-800 space-y-3">
                    {unsavedChangesCount > 0 && !fileHandle && <div className="p-3 bg-amber-500/10 rounded-xl text-center"><p className="text-[11px] text-amber-400 font-medium">⚠️ {unsavedChangesCount} unsaved records!</p></div>}
                    <button onClick={handleLogout} className="w-full flex items-center justify-center px-4 py-2.5 text-xs font-bold text-red-400 bg-red-500/10 hover:bg-red-600 hover:text-white rounded-xl"><LogoutIcon /> Log Out</button>
                </div>
              </aside>

              <main className="flex-1 flex flex-col min-w-0 overflow-y-auto">
                <header className="bg-white border-b px-8 py-5 flex flex-col sm:flex-row sm:justify-between gap-4">

                    <h1 className="text-xl font-black text-slate-950 capitalize">{activeTab} WorkSpace</h1>

                    {!fileHandle && <button onClick={connectDesktopFile} className="flex items-center px-4 py-2 text-xs font-bold text-emerald-700 bg-emerald-50 border rounded-xl"><SaveIcon /> Link Desktop CSV</button>}
                    <button onClick={exportToCSV} className="flex items-center px-4 py-2 text-xs font-bold text-white bg-indigo-600 rounded-xl"><DownloadIcon /> Manual Backup</button>
                  </div>
                </header>

                <div className="p-8 max-w-7xl w-full mx-auto space-y-6">
                    {/* DASHBOARD */}
                    {activeTab === 'dashboard' && (
                        <div className="space-y-6">
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
                              <div className="bg-white p-6 rounded-2xl shadow-sm border"><h3 className="text-xs font-bold text-slate-400 uppercase">Purchased Goods</h3><p className="text-2xl font-black text-blue-600 mt-2">₹{totalPurchases.toLocaleString('en-IN')}</p></div>
                              <div className="bg-white p-6 rounded-2xl shadow-sm border"><h3 className="text-xs font-bold text-slate-400 uppercase">Supplier Liabilities</h3><p className="text-2xl font-black text-red-600 mt-2">₹{totalLiability.toLocaleString('en-IN')}</p></div>
                              <div className="bg-white p-6 rounded-2xl shadow-sm border"><h3 className="text-xs font-bold text-slate-400 uppercase">Combined Sales</h3><p className="text-2xl font-black text-emerald-600 mt-2">₹{totalSales.toLocaleString('en-IN')}</p></div>
                              <div className="bg-slate-900 p-6 rounded-2xl shadow-lg border"><h3 className="text-xs font-bold text-slate-400 uppercase">Liability Balance</h3><p className="text-3xl font-black text-white mt-2">₹{currentBalance.toLocaleString('en-IN')}</p></div>
                            </div>
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border lg:col-span-2"><h3 className="text-sm font-bold mb-4">Financial Volume Trend</h3><LedgerChart transactions={transactions} openingBalance={openingBalance} /></div>
                                <div className="bg-white p-6 rounded-2xl shadow-sm border lg:col-span-1 flex flex-col"><h3 className="text-sm font-bold mb-4">Recent Actions</h3>
                                    <div className="flex-1 divide-y overflow-y-auto space-y-3">
                                        {transactions.slice(-6).reverse().map((t, idx) => (
                                            <div key={idx} className="pt-3 flex items-center justify-between text-xs">
                                                <div><p className="font-bold capitalize">{t.particulars}</p><span className="text-[10px] text-slate-400">{formatDate(t.date)}</span></div>
                                                <span className={`font-bold ${t.saleAmount > 0 ? 'text-emerald-600' : 'text-red-500'}`}>{t.saleAmount > 0 ? `- ₹${t.saleAmount}` : `+ ₹${t.liabilityAmount}`}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* LEDGER ENTRY */}
                    {activeTab === 'ledger' && (

                              <form onSubmit={handleSubmit} className="space-y-4">

                                <div><label className="block text-xs font-bold text-slate-500 uppercase mb-1">Particulars</label><input type="text" required list="part-ops" value={particulars} onChange={(e) => setParticulars(e.target.value)} className="w-full px-4 py-2 border rounded-lg uppercase" />
                                  <datalist id="part-ops"><option value="cash" /><option value="upi" />{knownCompanies.map(c => <React.Fragment key={c}><option value={c} /><option value={`${c} purchase return`} /></React.Fragment>)}</datalist>
                                </div>
                                <div><label className="block text-xs font-bold text-slate-500 uppercase mb-1">PIV No.</label><input type="text" value={pivNo} onChange={(e) => setPivNo(e.target.value)} className="w-full px-4 py-2 border rounded-lg" /></div>
                                <hr/>
                                <div className="space-y-3">

                                  <div className="grid grid-cols-2 gap-3">
                                    <div><label className="block text-[10px] font-bold text-red-600 uppercase mb-1">Liability (+)</label><input type="number" step="0.01" min="0" value={liabilityAmount} onChange={(e) => setLiabilityAmount(e.target.value)} className="w-full px-3 py-2 border bg-red-50/20 rounded-lg" /></div>
                                    <div><label className="block text-[10px] font-bold text-emerald-600 uppercase mb-1">Sales/Pay (-)</label><input type="number" step="0.01" min="0" value={saleAmount} onChange={(e) => setSaleAmount(e.target.value)} className="w-full px-3 py-2 border bg-emerald-50/20 rounded-lg" /></div>
                                  </div>
                                </div>
                                <button type="submit" className="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-md">Post Transaction</button>
                              </form>

                          <div className="lg:col-span-2 space-y-4">
                            <div className="bg-white rounded-2xl shadow-sm border overflow-hidden">
                              <div className="p-5 border-b flex flex-col md:flex-row justify-between bg-slate-50/50">
                                <h2 className="text-sm font-bold uppercase">Transactions</h2>
                                <div className="flex gap-2">
                                    <div className="relative"><span className="absolute inset-y-0 left-3 flex items-center pointer-events-none"><SearchIcon /></span><input type="text" placeholder="Search..." value={searchTerm} onChange={(e) => { setSearchTerm(e.target.value); setCurrentPage(1); }} className="pl-9 pr-4 py-1.5 w-48 border rounded-xl text-xs" /></div>
                                    <select value={filterType} onChange={(e) => { setFilterType(e.target.value); setCurrentPage(1); }} className="px-3 py-1.5 border rounded-xl text-xs"><option value="all">All</option><option value="purchase">Purchases</option><option value="liability">Liabilities</option><option value="sale">Sales</option></select>
                                </div>
                              </div>
                              <div className="overflow-x-auto">
                                <table className="w-full text-left text-sm">
                                  <thead className="bg-slate-50 text-slate-400 font-bold text-xs uppercase border-b">
                                    <tr><th className="px-6 py-4">Date</th><th className="px-6 py-4">Particulars</th><th className="px-6 py-4">PIV No.</th><th className="px-6 py-4 text-right">Purch(Info)</th><th className="px-6 py-4 text-right">Liab(+)</th><th className="px-6 py-4 text-right">Pay(-)</th><th className="px-6 py-4 text-right">Balance</th><th className="px-6 py-4 text-center">Act</th></tr>
                                  </thead>
                                  <tbody className="divide-y divide-slate-100">
                                    {paginatedLedger.length === 0 ? (<tr><td colSpan="8" className="px-6 py-12 text-center text-slate-400">No entries found.</td></tr>) : (
                                      paginatedLedger.map((t) => (
                                        <tr key={t.id} className="hover:bg-slate-50/50">
                                          <td className="px-6 py-4 text-xs font-semibold">{formatDate(t.date)}</td>
                                          <td className="px-6 py-4 font-bold capitalize">{t.particulars}</td>
                                          <td className="px-6 py-4 text-slate-400">{t.pivNo || '-'}</td>
                                          <td className="px-6 py-4 text-right text-xs font-bold text-blue-600">{t.purchaseValue ? t.purchaseValue.toLocaleString('en-IN') : ''}</td>
                                          <td className="px-6 py-4 text-right text-xs font-bold text-red-600">{t.liabilityAmount ? t.liabilityAmount.toLocaleString('en-IN') : ''}</td>
                                          <td className="px-6 py-4 text-right text-xs font-bold text-emerald-600">{t.saleAmount ? t.saleAmount.toLocaleString('en-IN') : ''}</td>
                                          <td className="px-6 py-4 text-right font-black">{t.runningBalance.toLocaleString('en-IN', { minimumFractionDigits: 2 })}</td>
                                          <td className="px-6 py-4 text-center"><button onClick={() => handleDelete(t.id)} className="p-2 text-slate-400 hover:text-red-500 rounded-lg"><TrashIcon /></button></td>
                                        </tr>
                                      ))
                                    )}
                                  </tbody>
                                </table>
                              </div>
                              {totalPages > 1 && (
                                <div className="p-4 bg-slate-50/80 border-t flex justify-between text-xs">
                                    <button onClick={() => setCurrentPage(prev => Math.max(1, prev - 1))} disabled={currentPage === 1} className="px-3 py-1.5 border bg-white rounded-lg disabled:opacity-50">Prev</button>
                                    <span className="font-bold">Page {currentPage} of {totalPages}</span>
                                    <button onClick={() => setCurrentPage(prev => Math.min(totalPages, prev + 1))} disabled={currentPage === totalPages} className="px-3 py-1.5 border bg-white rounded-lg disabled:opacity-50">Next</button>
                                </div>
                              )}
                            </div>
                          </div>
                        </div>
                    )}

                    {/* NEW SUPPLIER DIRECTORY & BILL SETTLEMENT */}
                    {activeTab === 'companies' && (
                        <div className="bg-white p-6 rounded-2xl shadow-sm border">
                            <div className="flex justify-between items-center mb-6">
                                <div>
                                    <h2 className="text-lg font-black text-slate-900">Supplier Ledger & Settlement</h2>
                                    <p className="text-xs text-slate-400 font-semibold mt-1">Track Total Billed, Total Paid, and Settle Outstanding Amounts directly.</p>
                                </div>
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                                {companyBalances.map((comp, idx) => (
                                    <div key={idx} className="bg-slate-50 p-5 rounded-2xl border hover:border-indigo-200 transition-all flex flex-col justify-between">
                                        <div>
                                            <h3 className="font-black text-slate-900 capitalize text-lg mb-4 border-b border-slate-200 pb-2 flex justify-between items-center">
                                                {comp.name}
                                            </h3>
                                            <div className="space-y-3 text-xs font-semibold mb-6">
                                                <div className="flex justify-between items-center bg-white p-2 rounded-lg border border-slate-100 shadow-sm">
                                                    <span className="text-slate-500">Total Billed Amount (+):</span>
                                                    <span className="text-red-600 font-bold">₹{comp.bills.toLocaleString('en-IN', {minimumFractionDigits:2})}</span>
                                                </div>
                                                <div className="flex justify-between items-center bg-white p-2 rounded-lg border border-slate-100 shadow-sm">
                                                    <span className="text-slate-500">Total Paid Amount (-):</span>
                                                    <span className="text-emerald-600 font-bold">₹{comp.returnsPayments.toLocaleString('en-IN', {minimumFractionDigits:2})}</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div>
                                            <div className="pt-4 border-t border-slate-200 flex justify-between items-center mb-4">
                                                <span className="text-[10px] uppercase font-bold text-slate-400 tracking-widest">Active Balance</span>
                                                <p className="text-lg font-black text-slate-900">₹{comp.netOutstanding.toLocaleString('en-IN', {minimumFractionDigits:2})}</p>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => setSelectedCompanyName(comp.name)} className="flex-1 py-2.5 bg-slate-200 hover:bg-slate-300 text-slate-800 font-bold text-xs rounded-xl transition-all">Statements</button>
                                                <button onClick={() => setQuickPayCompany(comp.name)} className="flex-1 py-2.5 bg-emerald-500 hover:bg-emerald-600 text-white font-bold text-xs rounded-xl shadow-md transition-all">
                                                    <MoneyIcon /> Settle Bill
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* REPORTS */}
                    {activeTab === 'reports' && (
                        <div className="bg-white p-6 rounded-2xl shadow-md border-2 border-indigo-100">
                          <div className="flex flex-col md:flex-row justify-between mb-6 border-b pb-4">
                              <h2 className="text-xl font-bold flex items-center"><ReportIcon /> Dynamic Reports</h2>
                              <div className="flex gap-4 items-end mt-4 md:mt-0">
                                  <div><label className="block text-xs font-medium mb-1">Start Date</label><input type="date" value={reportStartDate} onChange={(e) => setReportStartDate(e.target.value)} className="px-3 py-1.5 border rounded-md text-sm" /></div>
                                  <div><label className="block text-xs font-medium mb-1">End Date</label><input type="date" value={reportEndDate} onChange={(e) => setReportEndDate(e.target.value)} className="px-3 py-1.5 border rounded-md text-sm" /></div>
                                  <button onClick={exportReportToPDF} className="flex items-center px-4 py-2 text-sm font-bold text-white bg-indigo-600 rounded-xl"><DownloadIcon /> Export PDF</button>
                              </div>
                          </div>
                          <div className="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
                              <div className="bg-slate-50 p-4 rounded-xl border"><p className="text-xs font-bold uppercase mb-1">Cash Sale</p><p className="text-lg font-bold">₹{reportData.totalCashSale.toLocaleString('en-IN')}</p></div>
                              <div className="bg-slate-50 p-4 rounded-xl border"><p className="text-xs font-bold uppercase mb-1">UPI Sale</p><p className="text-lg font-bold">₹{reportData.totalUpiSale.toLocaleString('en-IN')}</p></div>
                              <div className="bg-emerald-50 p-4 rounded-xl border"><p className="text-xs font-bold uppercase mb-1 text-emerald-700">Total Sales</p><p className="text-xl font-bold text-emerald-800">₹{reportData.totalCombinedSales.toLocaleString('en-IN')}</p></div>
                              <div className="bg-blue-50 p-4 rounded-xl border"><p className="text-xs font-bold uppercase mb-1 text-blue-700">Goods Purchase</p><p className="text-xl font-bold text-blue-800">₹{reportData.totalPurchaseValue.toLocaleString('en-IN')}</p></div>
                              <div className="bg-purple-50 p-4 rounded-xl border"><p className="text-xs font-bold uppercase mb-1 text-purple-700">Purchase Returns</p><p className="text-xl font-bold text-purple-800">₹{reportData.totalPurchaseReturn.toLocaleString('en-IN')}</p></div>
                          </div>
                          <div>
                              <h3 className="text-sm font-bold uppercase mb-3">Company-Wise Bill Outstanding</h3>
                              <div className="overflow-x-auto border rounded-lg">
                                  <table className="w-full text-left text-sm">
                                      <thead className="bg-slate-50 font-bold border-b"><tr><th className="px-4 py-3">Company</th><th className="px-4 py-3 text-right">Bills(+)</th><th className="px-4 py-3 text-right">Pay(-)</th><th className="px-4 py-3 text-right">Outstanding</th></tr></thead>
                                      <tbody className="divide-y">
                                          {reportData.companyStats.map((c, i) => (
                                              <tr key={i} className="hover:bg-slate-50"><td className="px-4 py-3 font-bold capitalize">{c.name}</td><td className="px-4 py-3 text-right text-red-600">{c.bills.toLocaleString('en-IN')}</td><td className="px-4 py-3 text-right text-emerald-600">{c.returnsPayments.toLocaleString('en-IN')}</td><td className="px-4 py-3 text-right font-black">{c.netOutstanding.toLocaleString('en-IN')}</td></tr>
                                          ))}
                                      </tbody>
                                  </table>
                              </div>
                          </div>
                        </div>
                    )}

                    {/* SETTINGS */}
                    {activeTab === 'settings' && (
                        <div className="bg-white p-6 rounded-2xl shadow-sm border space-y-6">
                            <div>
                                <h2 className="text-lg font-bold mb-4">Ledger Initialization</h2>
                                <form onSubmit={handleUpdateBalance} className="flex gap-4 items-end">
                                  <div><label className="block text-xs font-bold uppercase mb-1">Opening Balance (₹)</label><input type="number" step="0.01" value={newOpeningBalance} onChange={(e) => setNewOpeningBalance(e.target.value)} className="w-64 px-4 py-2 border rounded-lg" /></div>
                                  <button type="submit" className="px-4 py-2 bg-slate-900 text-white font-bold rounded-lg">Update</button>
                                </form>
                            </div>
                            <hr />
                            <div>
                                <h2 className="text-lg font-bold mb-2">Bulk Upload (Excel / CSV)</h2>
                                <input type="file" accept=".xlsx, .xls, .csv" onChange={handleFileUpload} className="block w-full text-sm py-2 file:py-2 file:px-4 file:rounded-xl file:border-0 file:bg-indigo-50 file:text-indigo-700 cursor-pointer" />
                                {excelSheets.length > 0 && (
                                    <div className="mt-4 bg-indigo-50 p-4 rounded-xl border max-w-md">
                                        <label className="block text-xs font-extrabold uppercase mb-2">Select Sheet:</label>
                                        <select value={selectedSheet} onChange={(e) => setSelectedSheet(e.target.value)} className="w-full px-3 py-2 border rounded-lg text-sm mb-3">
                                            <option value="">-- Choose a sheet --</option>{excelSheets.map(n => <option key={n} value={n}>{n}</option>)}
                                        </select>
                                        <button onClick={importSelectedSheet} disabled={!selectedSheet} className="px-4 py-2 text-xs font-bold text-white bg-indigo-600 rounded-lg">Import Data</button>
                                    </div>
                                )}
                            </div>
                            <hr />
                            <div>
                                <h2 className="text-lg font-bold mb-2">Change Admin Password</h2>
                                {resetMessage && <div className={`mb-4 p-3 text-sm rounded-lg border ${resetMessage.type === 'error' ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-600'}`}>{resetMessage.text}</div>}
                                <form onSubmit={handlePasswordReset} className="space-y-3 max-w-sm">
                                    <input type="password" placeholder="Current Password" value={resetCurrentPass} onChange={(e) => setResetCurrentPass(e.target.value)} className="w-full px-4 py-2 border rounded-lg" required />
                                    <input type="password" placeholder="New Password" value={resetNewPass} onChange={(e) => setResetNewPass(e.target.value)} className="w-full px-4 py-2 border rounded-lg" required />
                                    <input type="password" placeholder="Confirm New Password" value={resetConfirmPass} onChange={(e) => setResetConfirmPass(e.target.value)} className="w-full px-4 py-2 border rounded-lg" required />
                                    <button type="submit" className="px-4 py-2 text-xs font-bold bg-indigo-600 text-white rounded-lg">Update Password</button>
                                </form>
                            </div>
                            <hr />
                            <div>
                                <h2 className="text-lg font-bold text-red-600 mb-2">Danger Zone</h2>
                                <button onClick={handleClearData} className="px-4 py-2 text-xs font-bold bg-red-100 text-red-700 rounded-lg">Clear All Data</button>
                            </div>
                        </div>
                    )}
                </div>
              </main>

              {/* MODAL 1: QUICK PAY (SETTLE BILL) */}
              {quickPayCompany && (
                  <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
                      <div className="bg-white rounded-3xl max-w-md w-full shadow-2xl overflow-hidden border border-emerald-100">
                          <div className="p-6 bg-emerald-600 text-white flex justify-between items-center">
                              <div>
                                  <span className="text-[10px] uppercase font-bold tracking-widest text-emerald-200">Settle Supplier Bill</span>
                                  <h2 className="text-xl font-black capitalize tracking-tight">{quickPayCompany}</h2>
                              </div>
                              <button onClick={() => setQuickPayCompany(null)} className="text-emerald-200 hover:text-white font-extrabold text-sm">✕</button>
                          </div>
                          
                          <form onSubmit={handleQuickPaySubmit} className="p-6 space-y-4">
                              <div className="bg-emerald-50 p-4 rounded-xl border border-emerald-100 text-center mb-4">
                                  <p className="text-xs font-bold text-emerald-800 uppercase">Current Outstanding</p>
                                  <p className="text-2xl font-black text-emerald-600">₹{(companyBalances.find(c => c.name === quickPayCompany)?.netOutstanding || 0).toLocaleString('en-IN')}</p>
                              </div>
                              
                              <div>
                                  <label className="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">Payment Date</label>
                                  <input type="date" required value={quickPayDate} onChange={(e) => setQuickPayDate(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl font-bold focus:ring-2 focus:ring-emerald-500"/>
                              </div>
                              <div>
                                  <label className="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">Paid Amount (₹)</label>
                                  <input type="number" step="0.01" min="0" required value={quickPayAmount} onChange={(e) => setQuickPayAmount(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-lg text-emerald-600 focus:ring-2 focus:ring-emerald-500" placeholder="0.00"/>
                              </div>
                              <div>
                                  <label className="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">Ref / Cheque No. (Optional)</label>
                                  <input type="text" value={quickPayRef} onChange={(e) => setQuickPayRef(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl font-bold focus:ring-2 focus:ring-emerald-500" placeholder="e.g. UTR / Cash"/>
                              </div>
                              
                              <button type="submit" className="w-full py-4 bg-emerald-600 hover:bg-emerald-700 text-white font-black text-sm rounded-xl shadow-lg mt-4 transition-all">
                                  Record Payment
                              </button>
                          </form>
                      </div>
                  </div>
              )}

              {/* MODAL 2: COMPANY STATEMENT (WITH RUNNING BALANCE) */}
              {activeCompanyDetails && (
                  <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                      <div className="bg-white rounded-3xl max-w-4xl w-full max-h-[85vh] flex flex-col shadow-2xl overflow-hidden border">
                          <div className="p-6 bg-slate-900 text-white flex justify-between items-center">
                              <div>
                                  <span className="text-[10px] uppercase font-bold tracking-widest text-indigo-400">Supplier Ledger Card</span>
                                  <h2 className="text-xl font-black capitalize tracking-tight">{activeCompanyDetails.name} Complete Statement</h2>
                              </div>
                              <button onClick={() => setSelectedCompanyName(null)} className="text-slate-400 hover:text-white font-extrabold text-sm">✕ Close</button>
                          </div>
                          
                          <div className="p-6 grid grid-cols-3 gap-4 border-b bg-slate-50">
                              <div><span className="text-[9px] uppercase font-extrabold text-slate-400">Total Billed (+)</span><p className="text-base font-extrabold text-red-600">₹{activeCompanyDetails.bills.toLocaleString('en-IN', {minimumFractionDigits:2})}</p></div>
                              <div><span className="text-[9px] uppercase font-extrabold text-slate-400">Total Paid (-)</span><p className="text-base font-extrabold text-emerald-600">₹{activeCompanyDetails.returnsPayments.toLocaleString('en-IN', {minimumFractionDigits:2})}</p></div>
                              <div><span className="text-[9px] uppercase font-extrabold text-slate-400">Current Outstanding (=)</span><p className="text-lg font-black">₹{activeCompanyDetails.netOutstanding.toLocaleString('en-IN', {minimumFractionDigits:2})}</p></div>
                          </div>
                          
                          <div className="flex-1 p-6 overflow-y-auto min-h-0">
                              <table className="w-full text-left text-xs">
                                  <thead className="bg-slate-100 font-bold uppercase border-b border-slate-200">
                                      <tr>
                                          <th className="px-4 py-3">Date</th>
                                          <th className="px-4 py-3">Particulars / Ref</th>
                                          <th className="px-4 py-3 text-right">Bill Amt (+)</th>
                                          <th className="px-4 py-3 text-right">Paid Amt (-)</th>
                                          <th className="px-4 py-3 text-right text-indigo-900">Running Bal.</th>
                                      </tr>
                                  </thead>
                                  <tbody className="divide-y divide-slate-100">
                                      {activeCompanyDetails.txs.map((tx, idx) => (
                                          <tr key={idx} className="hover:bg-slate-50 font-semibold">
                                              <td className="px-4 py-3">{formatDate(tx.date)}</td>
                                              <td className="px-4 py-3 capitalize text-slate-500">{tx.pivNo || 'Settlement'}</td>
                                              <td className="px-4 py-3 text-right text-red-600">{tx.liabilityAmount > 0 ? `₹${tx.liabilityAmount.toLocaleString('en-IN')}` : '-'}</td>
                                              <td className="px-4 py-3 text-right text-emerald-600">{tx.saleAmount > 0 ? `₹${tx.saleAmount.toLocaleString('en-IN')}` : '-'}</td>
                                              <td className="px-4 py-3 text-right font-black text-slate-900">₹{tx.compRunBal.toLocaleString('en-IN', {minimumFractionDigits:2})}</td>
                                          </tr>
                                      ))}
                                  </tbody>
                              </table>
                          </div>
                      </div>
                  </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
